    <main class="content-wrapper">
        <article class="glass-card aura-form-container">
            <div class="form-header">
                <h2>Send Me a Message</h2>
                <p>Ada project atau mau tanya-tanya? Gas, ketik di bawah!</p>

                    <textarea id="message" rows="5" required placeholder=" "></textarea>

                    <div class="line"></div>
                </div>

                <button type="submit" class="btn-supreme">
                    <span>TRANSMIT MESSAGE</span>
                </button>
            </form>
        </article>
